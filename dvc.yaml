stages:
  data_ingestion:
    cmd: python src/data_ingestion.py
    deps:
    - params.yaml
    outs:
    - data/raw/train.csv
    - data/raw/test.csv
  pre_processing:
    cmd: python src/pre_processing.py
    deps:
    - data/raw/train.csv
    - data/raw/test.csv
    - params.yaml
    outs:
    - data/interim/train_processed.csv
    - data/interim/test_processed.csv
  feature_engineering:
    cmd: python src/feature_engineering.py
    deps:
    - data/interim/train_processed.csv
    - data/interim/test_processed.csv
    - params.yaml
    outs:
    - data/processed/train_tfidf.csv
    - data/processed/test_tfidf.csv
  model_building:
    cmd: python src/model_building.py
    deps:
    - data/processed/train_tfidf.csv
    - params.yaml
    outs:
    - models/model.pkl
  model_evaluation:
    cmd: python src/model_evaluation.py
    deps:
    - models/model.pkl
    - data/processed/test_tfidf.csv
    - params.yaml
    metrics:
    - dvclive/metrics.json
    plots:
    - dvclive/plots/metrics
params:
- dvclive/params.yaml
metrics:
- dvclive/metrics.json
plots:
- dvclive/plots/metrics:
    x: step
